services:
  app:
    build: .
    volumes:
      - ${MEETSCRIBE_DATA_DIR:-./data}:/data
    networks:
      - internal
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ${SSL_CERT:-./certs/fullchain.pem}:/etc/nginx/ssl/fullchain.pem:ro
      - ${SSL_KEY:-./certs/privkey.pem}:/etc/nginx/ssl/privkey.pem:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
