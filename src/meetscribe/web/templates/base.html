<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetScribe</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <!-- TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10" integrity="sha384-YwQSRkoBOUtKKVfHQ8C2zCPslUZHuxiPHts6X/xQCuGHipTtRXd7ImqS1VTLlpiT" crossorigin="anonymous"></script>
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.13.3/dist/cdn.min.js" integrity="sha384-Rpe/8orFUm5Q1GplYBHxbuA8Az8O8C5sAoOsdbRWkqPjKFaxPgGZipj4zeHL7lxX" crossorigin="anonymous"></script>
    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js" integrity="sha384-BSxuMLxX+FCbTdYec3TbXlnMGEEM2QXTFdtDaveen71o+jswm2J36+xFqp8k4VHM" crossorigin="anonymous"></script>
    <!-- Marked.js (Markdown renderer) -->
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
    {% include "partials/tailwind_config.html" %}
    <style>
        [x-cloak] { display: none !important; }
        .step-active { @apply bg-primary-600 text-white; }
        .step-complete { @apply bg-green-500 text-white; }
        .step-pending { @apply bg-gray-200 text-gray-600; }
        .drag-ghost { opacity: 0.5; }
        .drag-chosen { opacity: 0.8; }
        /* Material Design ripple effect */
        .ripple { position: relative; overflow: hidden; }
        .ripple::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }
        .ripple:active::after { width: 200%; height: 200%; }
        /* Markdown prose styles */
        .prose h1 { font-size: 1.5rem; font-weight: 700; margin: 1rem 0 0.5rem; }
        .prose h2 { font-size: 1.25rem; font-weight: 700; margin: 1rem 0 0.5rem; }
        .prose h3 { font-size: 1.1rem; font-weight: 600; margin: 0.75rem 0 0.25rem; }
        .prose p { margin: 0.25rem 0; }
        .prose ul, .prose ol { padding-left: 1.5rem; margin: 0.25rem 0; }
        .prose ul { list-style-type: disc; }
        .prose ol { list-style-type: decimal; }
        .prose strong { font-weight: 700; }
        .prose em { font-style: italic; }
        .prose hr { border-top: 1px solid #d1d5db; margin: 0.75rem 0; }
        .prose code { background: #e5e7eb; padding: 0.1rem 0.3rem; border-radius: 0.25rem; font-size: 0.875em; }
        .prose blockquote { border-left: 3px solid #d1d5db; padding-left: 0.75rem; color: #6b7280; margin: 0.5rem 0; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="app()" x-init="init()">
    <div class="max-w-6xl mx-auto px-3 py-4 sm:px-4 sm:py-8">
        <!-- Header -->
        <header class="mb-6 sm:mb-8">
            <div class="flex items-center justify-between">
                <div class="min-w-0">
                    <h1 class="text-2xl sm:text-3xl font-bold text-gray-800">MeetScribe</h1>
                    <p class="text-gray-600 text-sm sm:text-base mt-1">Meeting transcription with speaker diarization</p>
                </div>
                <!-- User actions -->
                <div class="flex items-center gap-1 sm:gap-2 shrink-0">
                    <button
                        @click="if(confirm('Start a new session? Current progress will be lost.')) startNewSession()"
                        class="px-3 py-2 text-sm text-gray-600 hover:text-gray-800 hover:bg-gray-100 rounded-lg transition-colors"
                        title="Start new session"
                    >
                        <svg class="inline-block w-5 h-5 sm:mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                        </svg>
                        <span class="hidden sm:inline">New</span>
                    </button>
                    <form method="POST" action="/auth/logout" class="inline">
                        <input type="hidden" name="{{ csrf_field_name }}" value="{{ csrf_token(request) }}">
                        <button type="submit"
                            class="px-3 py-2 text-sm text-gray-500 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors"
                            title="Sign out"
                        >
                            <svg class="inline-block w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
                            </svg>
                        </button>
                    </form>
                </div>
            </div>
        </header>

        <!-- Stepper -->
        <nav x-show="!sessionNotFound" class="mb-4 sm:mb-8">
            <ol class="flex items-center justify-center space-x-2 sm:space-x-4">
                <template x-for="(step, index) in steps" :key="index">
                    <li class="flex items-center">
                        <button
                            @click="goToStep(index + 1)"
                            :disabled="!canGoToStep(index + 1)"
                            :class="{
                                'bg-primary-600 text-white': currentStep === index + 1,
                                'bg-green-500 text-white': index + 1 < currentStep,
                                'bg-gray-200 text-gray-600': index + 1 > currentStep,
                                'cursor-not-allowed opacity-50': !canGoToStep(index + 1)
                            }"
                            class="w-9 h-9 sm:w-10 sm:h-10 rounded-full flex items-center justify-center text-sm sm:text-base font-semibold shadow-md transition-all duration-200 hover:shadow-lg"
                        >
                            <span x-show="index + 1 >= currentStep" x-text="index + 1"></span>
                            <svg x-show="index + 1 < currentStep" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                            </svg>
                        </button>
                        <span
                            class="ml-2 text-sm font-medium hidden sm:inline"
                            :class="currentStep === index + 1 ? 'text-primary-600' : 'text-gray-500'"
                            x-text="step.name"
                        ></span>
                        <div x-show="index < steps.length - 1" class="w-8 h-0.5 bg-gray-300 mx-2 hidden sm:block"></div>
                    </li>
                </template>
            </ol>
        </nav>

        <!-- Main Content -->
        <main class="bg-white rounded-2xl shadow-xl p-4 sm:p-6 md:p-8">
            {% block content %}{% endblock %}
        </main>

        <!-- Footer -->
        <footer class="mt-4 sm:mt-8 text-center text-gray-500 text-xs sm:text-sm">
            <p>MeetScribe - Meeting transcription with speaker diarization</p>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
