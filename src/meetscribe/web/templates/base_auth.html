<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeetScribe — {% block title %}Login{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    {% include "partials/tailwind_config.html" %}
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">MeetScribe</h1>
            <p class="text-gray-500 mt-1">Meeting transcription with speaker diarization</p>
        </div>

        <div class="bg-white rounded-xl shadow-md p-8">
            {% if error %}
            <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">
                {{ error }}
            </div>
            {% endif %}

            {% block content %}{% endblock %}
        </div>

        {% block footer %}{% endblock %}
    </div>
</body>
</html>
