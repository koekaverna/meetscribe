{% extends "base_auth.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<h2 class="text-xl font-semibold text-gray-800 mb-6">Sign In</h2>

<form method="POST" action="/auth/login">
    <input type="hidden" name="{{ csrf_field_name }}" value="{{ csrf_token(request) }}">
    <div class="mb-4">
        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" id="username" name="username" required autofocus
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent">
    </div>

    <div class="mb-6">
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="password" name="password" required
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent">
    </div>

    <button type="submit"
            class="w-full bg-primary-600 hover:bg-primary-700 text-white font-medium py-2.5 px-4 rounded-lg transition-colors">
        Sign In
    </button>
</form>
{% endblock %}

{% block footer %}
<p class="text-center text-sm text-gray-500 mt-4">
    Contact your admin to create an account.
</p>
{% endblock %}
