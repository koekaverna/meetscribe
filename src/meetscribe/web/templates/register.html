{% extends "base_auth.html" %}

{% block title %}Register User{% endblock %}

{% block content %}
<h2 class="text-xl font-semibold text-gray-800 mb-2">Create User</h2>
<p class="text-sm text-gray-500 mb-6">Team: <span class="font-medium text-gray-700">{{ team_name }}</span></p>

{% if success %}
<div class="mb-4 p-3 bg-green-50 border border-green-200 text-green-700 rounded-lg text-sm">
    User "{{ success }}" created successfully.
</div>
{% endif %}

<form method="POST" action="/auth/register">
    <input type="hidden" name="{{ csrf_field_name }}" value="{{ csrf_token(request) }}">
    <div class="mb-4">
        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" id="username" name="username" required autofocus
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent">
    </div>

    <div class="mb-4">
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" id="password" name="password" required minlength="8"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent">
    </div>

    <div class="mb-6">
        <label for="password_confirm" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
        <input type="password" id="password_confirm" name="password_confirm" required minlength="8"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-transparent">
    </div>

    <button type="submit"
            class="w-full bg-primary-600 hover:bg-primary-700 text-white font-medium py-2.5 px-4 rounded-lg transition-colors">
        Create User
    </button>
</form>
{% endblock %}

{% block footer %}
<p class="text-center text-sm text-gray-500 mt-4">
    <a href="/" class="text-primary-600 hover:text-primary-700 font-medium">Back to app</a>
</p>
{% endblock %}
