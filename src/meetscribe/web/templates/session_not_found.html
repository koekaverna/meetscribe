<!-- Session not found -->
<div x-show="sessionNotFound" x-cloak class="text-center py-16">
    <div class="text-6xl text-gray-300 mb-4">404</div>
    <h2 class="text-2xl font-bold text-gray-700 mb-2">Session not found</h2>
    <p class="text-gray-500 mb-6">This session doesn't exist or you don't have access to it.</p>
    <button
        @click="sessionNotFound = false; createSession()"
        class="px-6 py-3 text-white font-medium bg-primary-600 rounded-xl hover:bg-primary-700 transition-colors"
    >
        Start New Session
    </button>
</div>
